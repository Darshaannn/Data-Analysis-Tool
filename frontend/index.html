<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Pro | Auto Analyzer</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-effect">
            <div class="brand">
                <div class="logo-icon"></div>
                <span class="brand-name">AI Data Pro</span>
            </div>

            <nav class="nav-links">
                <div class="nav-item active" data-target="dashboard-view">
                    <span class="nav-icon">📊</span> Dashboard
                </div>
                <div class="nav-item" data-target="chat-view">
                    <span class="nav-icon">💬</span> Data Chat
                </div>
            </nav>

            <div class="sidebar-spacer"></div>

            <div class="upload-widget glass-card">
                <h3>New Dataset</h3>
                <div id="drop-zone">
                    <div class="upload-icon">📁</div>
                    <p>Drop Excel or CSV</p>
                    <input type="file" id="file-input" hidden>
                    <button class="btn-action" onclick="document.getElementById('file-input').click()">Select
                        File</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div id="file-status" class="file-status">No data loaded</div>
                <button class="btn-primary" id="export-btn" style="display: none;" onclick="window.print()">Export
                    Report</button>
            </header>

            <div class="scroll-container">
                <!-- Dashboard View -->
                <div id="dashboard-view" class="view active">
                    <section class="stat-cards-grid">
                        <div class="stat-card glass-card">
                            <label>Total Rows</label>
                            <div id="stat-rows" class="stat-value">0</div>
                        </div>
                        <div class="stat-card glass-card">
                            <label>Columns</label>
                            <div id="stat-cols" class="stat-value">0</div>
                        </div>
                        <div class="stat-card glass-card">
                            <label>Duplicates Removed</label>
                            <div id="stat-dupes" class="stat-value">0</div>
                        </div>
                    </section>

                    <section class="content-section">
                        <div class="glass-card full-width">
                            <h2>AI Summary Insights</h2>
                            <div id="ai-insights" class="insight-content">
                                <div class="empty-state">Upload a dataset to generate insights...</div>
                            </div>
                        </div>
                    </section>

                    <section class="content-section">
                        <h2>Visual Analysis</h2>
                        <div id="charts-container" class="charts-grid">
                            <!-- ECharts will be injected here -->
                        </div>
                    </section>
                </div>

                <!-- Chat View -->
                <div id="chat-view" class="view">
                    <div class="chat-container glass-card">
                        <div id="chat-messages" class="message-area">
                            <div class="system-message">Ask specific questions about your data...</div>
                        </div>
                        <div class="chat-input-wrapper">
                            <input type="text" id="chat-input"
                                placeholder="e.g. What is the highest value in column X?">
                            <button class="btn-icon" onclick="sendMessage()">➔</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
